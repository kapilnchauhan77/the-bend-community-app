# Render Blueprint — The Bend Community App
# Deploy: https://render.com/deploy?repo=https://github.com/kapilnchauhan77/the-bend-community-app

databases:
  - name: thebend-db
    plan: free
    databaseName: thebend
    user: thebend

services:
  # Backend API
  - type: web
    name: thebend-api
    plan: free
    runtime: docker
    rootDir: the-bend-backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: thebend-db
          property: connectionString
      - key: REDIS_URL
        value: ""
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
    healthCheckPath: /api/v1/health
    buildCommand: ""
    startCommand: "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"

  # Frontend
  - type: web
    name: thebend-frontend
    plan: free
    runtime: static
    rootDir: the-bend-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
